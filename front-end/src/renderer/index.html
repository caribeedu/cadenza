<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cadenza</title>
    <!--
      CSP compatible with both Electron production loads and the
      Vite dev server. 'unsafe-inline' / 'unsafe-eval' are required
      only while React/Vite's HMR client is active; production bundles
      run under the same policy without needing them but we keep a
      single policy for simplicity. connect-src is loose enough for
      Vite's HMR WebSocket plus the backend loopback port.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        connect-src 'self' ws://127.0.0.1:* ws://localhost:* http://127.0.0.1:* http://localhost:*;
        style-src 'self' 'unsafe-inline';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        img-src 'self' data: blob:;
      "
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
