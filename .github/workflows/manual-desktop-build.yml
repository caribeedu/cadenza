name: Manual Desktop Build

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.job_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            job_name: Build Windows Installer
            artifact_name: cadenza-windows-build
          - os: macos-latest
            job_name: Build macOS Installer
            artifact_name: cadenza-macos-build
          - os: ubuntu-latest
            job_name: Build Linux Installer
            artifact_name: cadenza-linux-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          npm test
          cd src-tauri && cargo test

      - name: Build Tauri installer
        run: npm run tauri:build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/**/*
